name: 🧪 Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # The package supports Node >= 18, but the *test* toolchain does not:
      # cheerio pulls in undici, which needs a global `File` (Node 20+). That
      # is a devDependency, so consumers on 18 are unaffected — but it means
      # 18 cannot be exercised here. Revisit if engines ever rises to >= 20.
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
